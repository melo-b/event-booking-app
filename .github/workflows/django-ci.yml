name: Django CI Pipeline

# 1. When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. What should it do?
jobs:
  test:
    runs-on: ubuntu-latest # Spins up a fresh Linux server

    steps:
    # Step A: Download your code into the server
    - name: Check out repository
      uses: actions/checkout@v4

    # Step B: Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # Modern Python version

    # Step C: Install your requirements
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step D: Provide dummy environment variables for testing
    - name: Create dummy .env file
      run: |
        echo "SECRET_KEY=dummy-secret-key-for-github-actions" > .env
        echo "DEBUG=True" >> .env

    # Step E: Run the tests you just wrote!
    - name: Run Django Tests
      run: |
        python manage.py test